<div class="content">

  <div class="section" id="subSection">
    <div class="section-header" onclick="toggleSection('sub')" style="cursor:pointer;display:flex;align-items:center;padding:10px 16px;background:#fafafa;border:1px solid #e0e0e0;border-radius:4px;margin-bottom:0;">

      <textarea id="subUrl" placeholder="https://example.com/sub1.php?token=xxx&#10;https://example.com/sub2.txt" style="width:100%;height:60px;font-family:monospace;font-size:13px;padding:8px;border:1px solid #ccc;border-radius:4px;resize:vertical;"></textarea>

    </div>

    <button class="btn-primary" onclick="saveConfig()">💾 保存</button>
  </div>

<script>
const FILENAME = "mdpc-outbounds.yaml";
let currentOutbounds = []; // [{core, uri, tag, protocol}]
let selectedIndex = -1;

// ── localStorage 持久化 selectedIndex（按 URI 追踪） ──
const LS_KEY_SELECTED_URI = "mdpc-selected-uri";

function saveSelectedUri() {
  const uri = (selectedIndex >= 0 && selectedIndex < currentOutbounds.length)
    ? currentOutbounds[selectedIndex].uri
    : null;
  if (uri) {
    localStorage.setItem(LS_KEY_SELECTED_URI, uri);
  } else {
    localStorage.removeItem(LS_KEY_SELECTED_URI);
  }
}

function loadSelectedIndex() {
  const saved = localStorage.getItem(LS_KEY_SELECTED_URI);
  if (!saved) return -1;
  const idx = currentOutbounds.findIndex(o => o.uri === saved);
  return idx >= 0 ? idx : -1;
}

function toggleSection(name) {
  const body = document.getElementById(name + "Body");
  const arrow = document.getElementById(name + "Arrow");
  body.classList.toggle("open");
  arrow.classList.toggle("open");
}

// --- URI 解析 ---

const PROTOCOL_CORE_MAP = {
  "anytls": "sing-box",
  "vless": "xray",
  "vmess": "v2ray",
  "hysteria2": "hy2",
  "hysteria": "hy2",
  "hy2": "hy2",
  "ss": "ss"
};

function parseUriString(uri) {
  uri = uri.trim();
  if (!uri) return null;

  var parts = URI.parse(uri);
  if (!parts.scheme || !parts.host) return null;

  const protocol = parts.scheme;
  const tag = parts.fragment ? decodeURIComponent(parts.fragment) : (protocol + "-" + parts.host);
  const core = PROTOCOL_CORE_MAP[protocol];
  if (!core) return null; // unsupported protocol

  return { core, uri, tag, protocol };
}

function parseAndAddUri() {
  const input = document.getElementById("uriInput").value.trim();
  if (!input) { showMsg("请输入节点链接", false); return; }

  const lines = input.split("\n").map(l => l.trim()).filter(l => l && l.includes("://"));
  if (lines.length === 0) { showMsg("未找到有效的链接", false); return; }

  let added = 0;
  for (let i = 0; i < lines.length; i++) {
    const ob = parseUriString(lines[i]);
    if (ob) {
      currentOutbounds.push(ob);
      added++;
    } else {
      showMsg("第 " + (i + 1) + " 条链接解析失败: " + lines[i].substring(0, 40) + "...", false);
    }
  }

  if (added > 0) {
    selectedIndex = currentOutbounds.length - added;
    renderOutboundList();
    updateFormFromOutbound();
    syncYamlFromOutbounds();
    saveSelectedUri();
    showMsg("已添加 " + added + " 条 outbound", true);
  }
}

// --- 订阅链接 ---

const CORS_PROXY = "https://corsproxy.io/?";

function subShowMsg(text, ok) {
  const el = document.getElementById("subStatus");
  const ts = new Date().toLocaleTimeString();
  el.innerHTML = "<span class='" + (ok ? "ok" : "err") + "'>[" + ts + "] " + text + "</span>";
}

function fetchWithTimeout(url, ms) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(timer));
}

// Fetch subscription content, try direct first then CORS proxy
async function fetchSubContent(url) {
  // 1. Try direct fetch
  try {
    const res = await fetchWithTimeout(url, 10000);
    if (res.ok) return await res.text();
  } catch(e) {}

  // 2. Fallback to CORS proxy
  try {
    const res = await fetchWithTimeout(CORS_PROXY + encodeURIComponent(url), 15000);
    if (res.ok) return await res.text();
    throw new Error("HTTP " + res.status);
  } catch(e) {
    throw new Error("获取失败: " + e.message);
  }
}

// Decode subscription content → array of URI strings
function decodeSubContent(text) {
  // Try base64 decode first
  let decoded = null;
  try {
    let b64 = text.trim().replace(/-/g, "+").replace(/_/g, "/");
    while (b64.length % 4 !== 0) b64 += "=";
    decoded = atob(b64);
  } catch(e) {}

  // If base64 decoded and contains URIs, use it; otherwise treat as plaintext
  const source = (decoded && decoded.indexOf("://") >= 0) ? decoded : text;
  return source.split("\n").map(l => l.trim()).filter(l => l && l.includes("://"));
}

async function fetchSub() {
  const raw = document.getElementById("subUrl").value.trim();
  if (!raw) { subShowMsg("请输入订阅链接", false); return; }

  const urls = raw.split("\n").map(l => l.trim()).filter(l => l);
  subShowMsg("正在获取 " + urls.length + " 个订阅...", true);

  let allUris = [];
  let okCount = 0;
  let failCount = 0;

  for (const url of urls) {
    try {
      const text = await fetchSubContent(url);
      const uris = decodeSubContent(text);
      allUris = allUris.concat(uris);
      okCount++;
    } catch(e) {
      failCount++;
    }
  }

  if (allUris.length === 0) {
    subShowMsg("未获取到任何节点" + (failCount > 0 ? "（" + failCount + " 个订阅失败）" : ""), false);
    return;
  }

  // Fill into uriInput textarea (append to existing, dedup)
  const textarea = document.getElementById("uriInput");
  const existing = textarea.value.trim().split("\n").map(l => l.trim()).filter(l => l);
  const merged = existing.concat(allUris);
  const unique = [...new Set(merged)];
  textarea.value = unique.join("\n");

  let msg = "已获取 " + allUris.length + " 条链接填入节点解析区域";
  if (okCount < urls.length) msg += "（" + okCount + "/" + urls.length + " 个订阅成功）";
  if (unique.length < merged.length) msg += "，去重 " + (merged.length - unique.length) + " 条";
  subShowMsg(msg, true);
}

// --- Outbound 列表 ---

function renderOutboundList() {
  const list = document.getElementById("outboundList");
  document.getElementById("outboundCount").textContent = currentOutbounds.length;

  if (currentOutbounds.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:#999;">暂无 outbound，粘贴链接后点击「解析并添加」</div>';
    return;
  }

  list.innerHTML = currentOutbounds.map((ob, i) =>
    '<div class="outbound-item ' + (i === selectedIndex ? 'active' : '') + '" onclick="selectOutbound(' + i + ')">' +
      '<span class="core-badge core-' + ob.core + '">' + ob.core + '</span>' +
      '<strong>' + escHtml(ob.tag) + '</strong>' +
      '<span class="proto-tag">(' + ob.protocol + ')</span>' +
      '<span class="uri-text" title="' + escHtml(ob.uri) + '">' + escHtml(ob.uri) + '</span>' +
    '</div>'
  ).join('');

  // Dynamic height: few items → natural height, many items → 60vh cap
  const capH = window.innerHeight * 0.6;
  list.style.maxHeight = (list.scrollHeight <= capH) ? 'none' : capH + 'px';
}

function escHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function selectOutbound(index) {
  selectedIndex = index;
  renderOutboundList();
  updateFormFromOutbound();
  updateStatus();
  saveSelectedUri();
}

function removeOutbound() {
  if (currentOutbounds.length === 0) { showMsg("没有可删除的 outbound", false); return; }
  if (selectedIndex < 0) { showMsg("请先选择要删除的 outbound", false); return; }

  currentOutbounds.splice(selectedIndex, 1);
  if (selectedIndex >= currentOutbounds.length) {
    selectedIndex = currentOutbounds.length - 1;
  }
  renderOutboundList();
  updateFormFromOutbound();
  syncYamlFromOutbounds();
  saveSelectedUri();
  showMsg("已删除", true);
}

function dedupOutbounds() {
  if (currentOutbounds.length === 0) { showMsg("列表为空", false); return; }
  const before = currentOutbounds.length;
  const seen = new Set();
  const unique = [];
  for (const ob of currentOutbounds) {
    if (!seen.has(ob.uri)) {
      seen.add(ob.uri);
      unique.push(ob);
    }
  }
  const removed = before - unique.length;
  if (removed === 0) { showMsg("没有重复节点", true); return; }
  currentOutbounds = unique;
  selectedIndex = loadSelectedIndex();
  renderOutboundList();
  updateFormFromOutbound();
  syncYamlFromOutbounds();
  saveSelectedUri();
  showMsg("已去除 " + removed + " 条重复节点（" + before + " → " + unique.length + "）", true);
}

// --- 表单同步 ---

function updateFormFromOutbound() {
  if (selectedIndex < 0 || selectedIndex >= currentOutbounds.length) {
    document.getElementById("formCore").value = "xray";
    document.getElementById("formTag").value = "";
    document.getElementById("formUri").value = "";
    return;
  }
  const ob = currentOutbounds[selectedIndex];
  document.getElementById("formCore").value = ob.core;
  document.getElementById("formTag").value = ob.tag;
  document.getElementById("formUri").value = ob.uri;
}

function syncFormToOutbound() {
  if (selectedIndex < 0 || selectedIndex >= currentOutbounds.length) return;
  const ob = currentOutbounds[selectedIndex];
  ob.tag = document.getElementById("formTag").value;
  // update URI fragment
  ob.uri = updateUriFragment(ob.uri, ob.tag);
  document.getElementById("formUri").value = ob.uri;
  renderOutboundList();
  syncYamlFromOutbounds();
}

function syncFormUriToOutbound() {
  if (selectedIndex < 0 || selectedIndex >= currentOutbounds.length) return;
  const uri = document.getElementById("formUri").value.trim();
  const parsed = parseUriString(uri);
  if (!parsed) return;
  const ob = currentOutbounds[selectedIndex];
  ob.uri = uri;
  ob.tag = parsed.tag;
  ob.protocol = parsed.protocol;
  ob.core = parsed.core; // core is derived from protocol
  document.getElementById("formCore").value = ob.core;
  document.getElementById("formTag").value = ob.tag;
  renderOutboundList();
  syncYamlFromOutbounds();
}

function updateUriFragment(uri, name) {
  const hashIdx = uri.indexOf("#");
  const base = hashIdx >= 0 ? uri.substring(0, hashIdx) : uri;
  return base + "#" + encodeURIComponent(name);
}

// --- YAML 同步 ---

function syncYamlFromOutbounds() {
  const data = { outbounds: currentOutbounds.map(ob => ob.uri) };
  document.getElementById("editor").value = jsyaml.dump(data, { lineWidth: -1, quotingType: '"', forceQuotes: false });
}

function syncOutboundsFromYaml() {
  const content = document.getElementById("editor").value.trim();
  if (!content) {
    currentOutbounds = [];
    selectedIndex = -1;
    renderOutboundList();
    updateFormFromOutbound();
    return;
  }
  try {
    const data = jsyaml.load(content);
    if (!data || !data.outbounds || !Array.isArray(data.outbounds)) {
      showMsg("YAML 格式错误: 缺少 outbounds 数组", false);
      return;
    }
    currentOutbounds = data.outbounds.map(item => {
      const uri = typeof item === "string" ? item : (item.uri || "");
      return parseUriString(uri) || { core: "xray", uri: uri, tag: uri, protocol: "?" };
    });
    selectedIndex = loadSelectedIndex();
    renderOutboundList();
    updateFormFromOutbound();
    showMsg("已从 YAML 同步 " + currentOutbounds.length + " 条 outbound", true);
  } catch (e) {
    showMsg("YAML 解析失败: " + e.message, false);
  }
}

// --- core API helper (不走 mdpc 的 /api/mdpc/ 前缀) ---

function coreApiUrl(core, path) {
  return document.getElementById("apiUrl").value.replace(/\/+$/, "") + "/api/" + core + path;
}

// --- 启动 / 停止 ---

async function startCore() {
  if (selectedIndex < 0 || selectedIndex >= currentOutbounds.length) {
    showMsg("请先选择一个 outbound", false); return;
  }

  const ob = currentOutbounds[selectedIndex];
  const core = ob.core;
  let configContent, filename;

  if (core === "xray") {
    const outbound = parseXrayUri(ob.uri);
    configContent = generateXrayConfig([outbound]);
    filename = "05-outbounds.json";
  } else if (core === "v2ray") {
    const outbound = parseVmessUri(ob.uri);
    configContent = generateV2rayConfig([outbound]);
    filename = "05-outbounds.json";
  } else if (core === "hy2") {
    const outbound = parseHy2Uri(ob.uri);
    const socksPort = localStorage.getItem("socks-port") || "10808";
    const httpPort = localStorage.getItem("http-port") || "10809";
    configContent = generateHy2Config(outbound, socksPort, httpPort);
    filename = "config.yaml";
  } else if (core === "sing-box") {
    const outbound = parseSingboxUri(ob.uri);
    configContent = generateSingboxConfig([outbound]);
    filename = "05-outbounds.json";
  } else if (core === "ss") {
    const outbound = parseSsUri(ob.uri);
    const socksPort = localStorage.getItem("socks-port") || "10808";
    const httpPort = localStorage.getItem("http-port") || "10809";
    configContent = generateSsConfig(outbound, socksPort, httpPort);
    filename = "local.json";
  } else {
    showMsg("不支持的内核: " + core, false); return;
  }

  // 1. 写入配置文件
  showMsg("正在写入 " + core + " 配置...", true);
  try {
    const res = await fetch(coreApiUrl(core, "/files/" + filename), {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content: configContent })
    });
    const data = await res.json();
    if (data.error) { showMsg("写入配置失败: " + data.error, false); return; }
  } catch (e) {
    showMsg("写入配置失败: " + e.message, false); return;
  }

  // 2. 启动内核
  showMsg("正在启动 " + core + "...", true);
  try {
    const res = await fetch(coreApiUrl(core, "/core/start"), { method: "POST" });
    const data = await res.json();
    if (data.error) { showMsg("启动失败: " + data.error, false); return; }
    showMsg("已启动 " + core + " (pid " + data.data.pid + ")", true);
    setTimeout(updateStatus, 1000);
  } catch (e) {
    showMsg("启动失败: " + e.message, false);
  }
}

async function stopCore() {
  const core = document.getElementById("formCore").value;
  if (!core) { showMsg("请先选择一个 outbound", false); return; }

  try {
    const res = await fetch(coreApiUrl(core, "/core/stop"), { method: "POST" });
    const data = await res.json();
    if (data.error) { showMsg("停止失败: " + data.error, false); return; }
    showMsg("已停止 " + core, true);
    updateStatus();
  } catch (e) {
    showMsg("停止失败: " + e.message, false);
  }
}

async function updateStatus() {
  const core = document.getElementById("formCore").value;
  if (!core) {
    document.getElementById("statusText").textContent = "";
    return;
  }
  try {
    const res = await fetch(coreApiUrl(core, "/core/status"));
    const data = await res.json();
    if (data.data) {
      document.getElementById("statusText").textContent =
        data.data.running ? core + " 运行中 (pid " + data.data.pid + ")" : core + " 已停止";
    }
  } catch (e) {
    document.getElementById("statusText").textContent = "无法连接";
  }
}

// 编辑器变化时自动同步
document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("editor").addEventListener("input", function() {
    syncOutboundsFromYaml();
  });
  updateStatus();
});
</script>
<script src="./common.js"></script>
<script>
// Override readConfig/saveConfig to handle missing mdpc core gracefully
async function readConfig() {
  try {
    const res = await fetch(api("/files/" + FILENAME));
    const data = await res.json();
    if (data.error) {
      if (data.error.includes("core not found")) {
        showMsg("配置文件读取失败: mdpc 核心未在配置文件中定义，请检查 mdpc-config.yaml", false);
      } else {
        showMsg(data.error, false);
      }
      return;
    }
    document.getElementById("editor").value = data.data.content;
    showMsg("配置已加载", true);
    syncOutboundsFromYaml();
  } catch (e) {
    showMsg("连接后端失败: " + e.message, false);
  }
}

async function saveConfig() {
  const content = document.getElementById("editor").value;
  if (!content.trim()) {
    showMsg("内容为空，跳过保存", false);
    return;
  }
  try {
    const res = await fetch(api("/files/" + FILENAME), {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content })
    });
    const data = await res.json();
    if (data.error) {
      if (data.error.includes("core not found")) {
        showMsg("保存失败: mdpc 核心未在配置文件中定义，请检查 mdpc-config.yaml", false);
      } else {
        showMsg(data.error, false);
      }
      return;
    }
    showMsg("保存成功", true);
  } catch (e) {
    showMsg("连接后端失败: " + e.message, false);
  }
}
</script>
