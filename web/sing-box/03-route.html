<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>03-route.json - sing-box</title>
<link rel="stylesheet" href="./common.css">
</head>
<body>

<div class="topbar">
  <span class="app-name">sing-box</span>
  <input class="api-url" id="apiUrl" value="http://127.0.0.1:18280">
  <button onclick="saveApiUrl()" style="padding:5px 10px;font-size:12px;border:1px solid #ccc;border-radius:4px;cursor:pointer;background:#fff;white-space:nowrap;">保存LocalStorage</button>
  <span class="status" id="statusText"></span>
  <div class="actions">
    <button class="btn-start" onclick="startCore()">▶ 启动</button>
    <button class="btn-stop" onclick="stopCore()">■ 停止</button>
  </div>
</div>

<div class="navbar">
  <a href="01-log.html">01-log</a>
  <a href="02-dns.html">02-dns</a>
  <a href="03-route.html" class="active">03-route</a>
  <a href="04-inbounds.html">04-inbounds</a>
  <a href="05-outbounds.html">05-outbounds</a>
</div>

<div class="status-bar" id="statusBar"></div>

<div class="content">
  <h2>03-route.json</h2>

  <!-- 预设模板 -->
  <details style="margin-bottom: 16px;" open>
    <summary style="cursor:pointer;font-weight:600;color:#1976d2;">📋 预设模板</summary>
    <div style="margin-top:8px;padding:12px;background:#f9f9f9;border:1px solid #e0e0e0;border-radius:4px;">
      <p style="font-size:13px;color:#666;margin-bottom:8px;">选择一个预设模板加载到编辑器，按需修改后保存</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button onclick="loadPreset('blacklist')" style="padding:8px 16px;background:#1976d2;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;">GFW 黑名单</button>
        <button onclick="loadPreset('whitelist')" style="padding:8px 16px;background:#388e3c;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;">GFW 白名单 / 国内直连</button>
      </div>
      <div style="margin-top:8px;font-size:12px;color:#999;">
        <span style="color:#1976d2;">● 黑名单</span> = 默认直连，被墙站点走 proxy &nbsp;|&nbsp;
        <span style="color:#388e3c;">● 白名单</span> = 默认代理，国内站点直连 direct
      </div>
    </div>
  </details>

  <div class="btn-row">
    <button onclick="readConfig()">读取配置</button>
  </div>
  <textarea class="editor" id="editor" placeholder="点击「读取配置」加载内容，或选择上方预设模板..."></textarea>
  <div class="btn-row" style="justify-content: flex-end; margin-top: 12px;">
    <button class="btn-primary" onclick="saveConfig()">保存</button>
  </div>
</div>

<script>
const FILENAME = "03-route.json";

// GFW 黑名单：默认 direct，被墙站点 → proxy
const PRESET_BLACKLIST = {
  "route": {
    "default_domain_resolver": "system",
    "rules": [
      {
        "rule_set": ["geosite-geolocation-!cn"],
        "outbound": "proxy"
      }
    ],
    "rule_set": [
      {
        "type": "remote",
        "tag": "geosite-geolocation-!cn",
        "format": "binary",
        "url": "https://github.com/SagerNet/sing-geosite/raw/rule-set/geosite-geolocation-!cn.srs",
        "download_detour": "proxy",
        "update_interval": "1d"
      },
      {
        "type": "remote",
        "tag": "geosite-cn",
        "format": "binary",
        "url": "https://github.com/SagerNet/sing-geosite/raw/rule-set/geosite-cn.srs",
        "download_detour": "proxy",
        "update_interval": "1d"
      }
    ],
    "final": "direct"
  }
};

// GFW 白名单 / 国内直连：默认 proxy，国内站点 → direct
const PRESET_WHITELIST = {
  "route": {
    "default_domain_resolver": "system",
    "rules": [
      {
        "ip_is_private": true,
        "outbound": "direct"
      },
      {
        "rule_set": ["geosite-cn"],
        "outbound": "direct"
      },
      {
        "rule_set": ["geoip-cn"],
        "outbound": "direct"
      }
    ],
    "rule_set": [
      {
        "type": "remote",
        "tag": "geosite-cn",
        "format": "binary",
        "url": "https://github.com/SagerNet/sing-geosite/raw/rule-set/geosite-cn.srs",
        "download_detour": "proxy",
        "update_interval": "1d"
      },
      {
        "type": "remote",
        "tag": "geoip-cn",
        "format": "binary",
        "url": "https://github.com/SagerNet/sing-geoip/raw/rule-set/geoip-cn.srs",
        "download_detour": "proxy",
        "update_interval": "1d"
      }
    ],
    "final": "proxy"
  }
};

function loadPreset(type) {
  let config;
  let name;
  if (type === 'blacklist') {
    config = PRESET_BLACKLIST;
    name = 'GFW 黑名单';
  } else if (type === 'whitelist') {
    config = PRESET_WHITELIST;
    name = 'GFW 白名单 / 国内直连';
  }

  document.getElementById('editor').value = JSON.stringify(config, null, 2);
  showMsg('已加载预设: ' + name, true);
}
</script>
<script src="./common.js"></script>
</body>
</html>
