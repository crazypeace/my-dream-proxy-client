name: Build Windows x64

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.3'

      - name: Build Windows x64
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -o my-dream-proxy-client.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-dream-proxy-client-windows-amd64
          path: my-dream-proxy-client.exe
