name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.3'

      - name: Build Windows x64
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -o my-dream-proxy-client.exe .

      - name: Prepare package
        run: |
          mkdir -p release/bin/xray
          mkdir -p release/web/xray
          cp my-dream-proxy-client.exe release/
          cp bin/xray/put_xray_bin_config_here release/bin/xray/
          cp web/xray/*.html release/web/xray/
          cd release
          zip -r ../my-dream-proxy-client-windows-amd64.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: my-dream-proxy-client-windows-amd64.zip
          generate_release_notes: true
